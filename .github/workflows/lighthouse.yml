name: Lighthouse CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run Lighthouse CI on production
        run: npx @lhci/cli@0.13.x autorun --config=.lighthouserc.json
